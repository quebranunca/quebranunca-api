services:
  postgres:
    image: postgres:16-alpine
    container_name: plataforma-futevolei-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-plataforma_futevolei_dev}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-plataforma_futevolei_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../quebranunca-api
      dockerfile: PlataformaFutevolei.Api/Dockerfile
    container_name: plataforma-futevolei-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-plataforma_futevolei_dev};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres};Ssl Mode=Disable
      Jwt__Chave: ${JWT_CHAVE:-chave-desenvolvimento-local-docker-quebranunca-2026}
      Frontend__Url: http://localhost:${FRONTEND_PORT:-5173};http://127.0.0.1:${FRONTEND_PORT:-5173}
      EmailConvitesCadastro__UrlApp: http://localhost:${FRONTEND_PORT:-5173}
      WhatsappConvitesCadastro__UrlApp: http://localhost:${FRONTEND_PORT:-5173}
    ports:
      - "${API_PORT:-5000}:8080"

volumes:
  postgres_data:
